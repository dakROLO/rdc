<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Example of how consulting time turns a broken workflow into a practical digital solution</title>
  <desc id="desc">A three-stage Royal Digital Clarity diagram showing a manual request process, a 30-minute workflow leak scan, and a streamlined Microsoft 365 workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081421"/>
      <stop offset="1" stop-color="#10243b"/>
    </linearGradient>
    <linearGradient id="consult" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42a5ff"/>
      <stop offset="1" stop-color="#8dd7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8dd7ff"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="46" fill="url(#bg)"/>
  <circle cx="130" cy="80" r="260" fill="#42a5ff" opacity="0.08"/>
  <circle cx="1470" cy="820" r="310" fill="#8dd7ff" opacity="0.06"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="800" y="76" text-anchor="middle" fill="#8dd7ff" font-size="24" font-weight="700" letter-spacing="5">WHAT THE CONSULTING TIME CREATES</text>
    <text x="800" y="132" text-anchor="middle" fill="#ffffff" font-size="48" font-weight="700">From scattered requests to a visible, repeatable workflow</text>
    <text x="800" y="174" text-anchor="middle" fill="#b9c6d9" font-size="23">Example: a manager spends every Friday collecting updates and rebuilding a status report</text>

    <g filter="url(#shadow)">
      <rect x="80" y="235" width="420" height="545" rx="32" fill="#14253b" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="590" y="235" width="420" height="545" rx="32" fill="#0e2035" stroke="#8dd7ff" stroke-opacity="0.55" stroke-width="2"/>
      <rect x="1100" y="235" width="420" height="545" rx="32" fill="#14253b" stroke="#ffffff" stroke-opacity="0.12"/>
    </g>

    <text x="120" y="290" fill="#ffb9b9" font-size="20" font-weight="700" letter-spacing="3">BEFORE</text>
    <text x="120" y="340" fill="#ffffff" font-size="34" font-weight="700">The workflow leak</text>
    <text x="120" y="382" fill="#b9c6d9" font-size="21">Updates arrive in email, chat,</text>
    <text x="120" y="412" fill="#b9c6d9" font-size="21">spreadsheets, and hallway conversations.</text>

    <g>
      <rect x="122" y="462" width="336" height="62" rx="15" fill="#203752"/>
      <circle cx="154" cy="493" r="12" fill="#ff9898"/>
      <text x="181" y="501" fill="#ffffff" font-size="21">Chase 8 people for updates</text>
      <rect x="122" y="540" width="336" height="62" rx="15" fill="#203752"/>
      <circle cx="154" cy="571" r="12" fill="#ff9898"/>
      <text x="181" y="579" fill="#ffffff" font-size="21">Copy answers into a tracker</text>
      <rect x="122" y="618" width="336" height="62" rx="15" fill="#203752"/>
      <circle cx="154" cy="649" r="12" fill="#ff9898"/>
      <text x="181" y="657" fill="#ffffff" font-size="21">Rebuild the weekly report</text>
    </g>
    <text x="120" y="731" fill="#ffb9b9" font-size="24" font-weight="700">2–4 manager hours every week</text>

    <text x="630" y="290" fill="#8dd7ff" font-size="20" font-weight="700" letter-spacing="3">30-MINUTE WORKFLOW LEAK SCAN</text>
    <text x="630" y="340" fill="#ffffff" font-size="34" font-weight="700">The consulting conversation</text>
    <text x="630" y="382" fill="#b9c6d9" font-size="21">We use one real process—not a generic</text>
    <text x="630" y="412" fill="#b9c6d9" font-size="21">technology pitch—to define the fix.</text>

    <g>
      <rect x="632" y="454" width="336" height="54" rx="14" fill="#183653"/>
      <text x="657" y="489" fill="#ffffff" font-size="21"><tspan fill="#8dd7ff" font-weight="700">01</tspan>  Show the current steps</text>
      <rect x="632" y="520" width="336" height="54" rx="14" fill="#183653"/>
      <text x="657" y="555" fill="#ffffff" font-size="21"><tspan fill="#8dd7ff" font-weight="700">02</tspan>  Find delays and duplicate work</text>
      <rect x="632" y="586" width="336" height="54" rx="14" fill="#183653"/>
      <text x="657" y="621" fill="#ffffff" font-size="21"><tspan fill="#8dd7ff" font-weight="700">03</tspan>  Pick the smallest useful change</text>
      <rect x="632" y="652" width="336" height="54" rx="14" fill="#183653"/>
      <text x="657" y="687" fill="#ffffff" font-size="21"><tspan fill="#8dd7ff" font-weight="700">04</tspan>  Define the first-version scope</text>
    </g>
    <rect x="642" y="729" width="316" height="40" rx="20" fill="url(#consult)"/>
    <text x="800" y="756" text-anchor="middle" fill="#04111f" font-size="19" font-weight="700">Leave with a practical next step</text>

    <text x="1140" y="290" fill="#a8e6cf" font-size="20" font-weight="700" letter-spacing="3">AFTER</text>
    <text x="1140" y="340" fill="#ffffff" font-size="34" font-weight="700">The practical first version</text>
    <text x="1140" y="382" fill="#b9c6d9" font-size="21">A simple Microsoft 365 workflow makes</text>
    <text x="1140" y="412" fill="#b9c6d9" font-size="21">the work visible and repeatable.</text>

    <g>
      <rect x="1142" y="452" width="336" height="64" rx="15" fill="#1b3a4b"/>
      <circle cx="1176" cy="484" r="14" fill="#a8e6cf"/>
      <text x="1205" y="492" fill="#ffffff" font-size="21">One update form</text>
      <rect x="1142" y="532" width="336" height="64" rx="15" fill="#1b3a4b"/>
      <circle cx="1176" cy="564" r="14" fill="#a8e6cf"/>
      <text x="1205" y="572" fill="#ffffff" font-size="21">Shared status list</text>
      <rect x="1142" y="612" width="336" height="64" rx="15" fill="#1b3a4b"/>
      <circle cx="1176" cy="644" r="14" fill="#a8e6cf"/>
      <text x="1205" y="652" fill="#ffffff" font-size="21">Automatic reminders</text>
    </g>
    <text x="1140" y="731" fill="#a8e6cf" font-size="24" font-weight="700">Live visibility instead of Friday chasing</text>

    <line x1="514" y1="508" x2="570" y2="508" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="1024" y1="508" x2="1080" y2="508" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/>

    <text x="800" y="842" text-anchor="middle" fill="#b9c6d9" font-size="19">Illustrative example. The recommended solution depends on the actual process, licensing, risk, and team needs.</text>
  </g>
</svg>
