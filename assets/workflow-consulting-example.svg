<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Example of how consulting time turns a broken workflow into a practical digital solution</title>
  <desc id="desc">A three-stage Royal Digital Clarity diagram showing a manual request process, a 30-minute workflow leak scan, and a streamlined Microsoft 365 workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#081421"/><stop offset="1" stop-color="#10243b"/></linearGradient>
    <linearGradient id="consult" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#42a5ff"/><stop offset="1" stop-color="#8dd7ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8dd7ff"/></marker>
  </defs>
  <rect width="1600" height="900" rx="46" fill="url(#bg)"/>
  <circle cx="130" cy="80" r="260" fill="#42a5ff" opacity="0.08"/>
  <circle cx="1470" cy="820" r="310" fill="#8dd7ff" opacity="0.06"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="800" y="76" text-anchor="middle" fill="#8dd7ff" font-size="24" font-weight="700" letter-spacing="5">WHAT THE CONSULTING TIME CREATES</text>
    <text x="800" y="132" text-anchor="middle" fill="#ffffff" font-size="48" font-weight="700">From scattered requests to a visible, repeatable workflow</text>
    <text x="800" y="174" text-anchor="middle" fill="#b9c6d9" font-size="23">Example: a manager spends every Friday collecting updates and rebuilding a status report</text>
    <g filter="url(#shadow)"><rect x="80" y="235" width="420" height="545" rx="32" fill="#14253b" stroke="#ffffff" stroke-opacity="0.12"/><rect x="590" y="235" width="420" height="545" rx="32" fill="#0e2035" stroke="#8dd7ff" stroke-opacity="0.55" stroke-width="2"/><rect x="1100" y="235" width="420" height="545" rx="32" fill="#14253b" stroke="#ffffff" stroke-opacity="0.12"/></g>

    <text x="120" y="290" fill="#ffb9b9" font-size="20" font-weight="700" letter-spacing="3">BEFORE</text>
    <text x="120" y="340" fill="#ffffff" font-size="30" font-weight="700">The workflow leak</text>
    <text x="120" y="380" fill="#b9c6d9" font-size="19"><tspan x="120" dy="0">Updates arrive in email, chat,</tspan><tspan x="120" dy="25">spreadsheets, and hallway</tspan><tspan x="120" dy="25">conversations.</tspan></text>
    <g>
      <rect x="112" y="478" width="356" height="62" rx="15" fill="#203752"/><circle cx="144" cy="509" r="12" fill="#ff9898"/><text x="171" y="516" fill="#ffffff" font-size="18">Chase 8 people for updates</text>
      <rect x="112" y="556" width="356" height="68" rx="15" fill="#203752"/><circle cx="144" cy="590" r="12" fill="#ff9898"/><text x="171" y="584" fill="#ffffff" font-size="17"><tspan x="171" dy="0">Copy answers into</tspan><tspan x="171" dy="20">a tracker</tspan></text>
      <rect x="112" y="640" width="356" height="62" rx="15" fill="#203752"/><circle cx="144" cy="671" r="12" fill="#ff9898"/><text x="171" y="678" fill="#ffffff" font-size="18">Rebuild the weekly report</text>
    </g>
    <text x="120" y="748" fill="#ffb9b9" font-size="23" font-weight="700">2–4 manager hours every week</text>

    <text x="800" y="282" text-anchor="middle" fill="#8dd7ff" font-size="16" font-weight="700" letter-spacing="2"><tspan x="800" dy="0">30-MINUTE WORKFLOW</tspan><tspan x="800" dy="19">LEAK SCAN</tspan></text>
    <text x="630" y="336" fill="#ffffff" font-size="28" font-weight="700"><tspan x="630" dy="0">The consulting</tspan><tspan x="630" dy="32">conversation</tspan></text>
    <text x="630" y="406" fill="#b9c6d9" font-size="18"><tspan x="630" dy="0">We use one real process—not a</tspan><tspan x="630" dy="24">generic technology pitch—to</tspan><tspan x="630" dy="24">define the fix.</tspan></text>
    <g>
      <rect x="622" y="492" width="356" height="58" rx="14" fill="#183653"/><text x="645" y="514" fill="#ffffff" font-size="15"><tspan fill="#8dd7ff" font-weight="700">01</tspan><tspan x="686" dy="0">Show the current</tspan><tspan x="686" dy="18">steps</tspan></text>
      <rect x="622" y="560" width="356" height="66" rx="14" fill="#183653"/><text x="645" y="584" fill="#ffffff" font-size="15"><tspan fill="#8dd7ff" font-weight="700">02</tspan><tspan x="686" dy="0">Find delays and</tspan><tspan x="686" dy="18">duplicate work</tspan></text>
      <rect x="622" y="636" width="356" height="66" rx="14" fill="#183653"/><text x="645" y="660" fill="#ffffff" font-size="15"><tspan fill="#8dd7ff" font-weight="700">03</tspan><tspan x="686" dy="0">Choose the smallest</tspan><tspan x="686" dy="18">useful change</tspan></text>
    </g>
    <rect x="620" y="716" width="360" height="48" rx="24" fill="url(#consult)"/><text x="800" y="738" text-anchor="middle" fill="#04111f" font-size="16" font-weight="700"><tspan x="800" dy="0">Leave with a practical</tspan><tspan x="800" dy="18">next step</tspan></text>

    <text x="1140" y="290" fill="#a8e6cf" font-size="20" font-weight="700" letter-spacing="3">AFTER</text>
    <text x="1140" y="336" fill="#ffffff" font-size="28" font-weight="700"><tspan x="1140" dy="0">The practical</tspan><tspan x="1140" dy="32">first version</tspan></text>
    <text x="1140" y="406" fill="#b9c6d9" font-size="18"><tspan x="1140" dy="0">A simple Microsoft 365 workflow</tspan><tspan x="1140" dy="24">makes the work visible and</tspan><tspan x="1140" dy="24">repeatable.</tspan></text>
    <g>
      <rect x="1132" y="492" width="356" height="64" rx="15" fill="#1b3a4b"/><circle cx="1166" cy="524" r="14" fill="#a8e6cf"/><text x="1195" y="531" fill="#ffffff" font-size="18">One update form</text>
      <rect x="1132" y="572" width="356" height="64" rx="15" fill="#1b3a4b"/><circle cx="1166" cy="604" r="14" fill="#a8e6cf"/><text x="1195" y="611" fill="#ffffff" font-size="18">Shared status list</text>
      <rect x="1132" y="652" width="356" height="64" rx="15" fill="#1b3a4b"/><circle cx="1166" cy="684" r="14" fill="#a8e6cf"/><text x="1195" y="691" fill="#ffffff" font-size="18">Automatic reminders</text>
    </g>
    <text x="1310" y="742" text-anchor="middle" fill="#a8e6cf" font-size="18" font-weight="700">Live visibility instead of</text><text x="1310" y="766" text-anchor="middle" fill="#a8e6cf" font-size="18" font-weight="700">Friday chasing</text>
    <line x1="514" y1="540" x2="570" y2="540" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/><line x1="1024" y1="540" x2="1080" y2="540" stroke="#8dd7ff" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="800" y="842" text-anchor="middle" fill="#b9c6d9" font-size="19">Illustrative example. The recommended solution depends on the actual process, licensing, risk, and team needs.</text>
  </g>
</svg>
